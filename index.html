<!DOCTYPE html>
<html>
<head>
    <title>My Game</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #111;
            color: white;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            background-color: limegreen;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }
    </style>
</head>
<body>

    <h1>🎮 Click Game</h1>
    <p>Score: <span id="score">0</span></p>

    <button onclick="addScore()">Click Me!</button>

    <script>
        let score = 0;

        function addScore() {
            score++;
            document.getElementById("score").textContent = score;
        }
    </script>

</body>
</html>
